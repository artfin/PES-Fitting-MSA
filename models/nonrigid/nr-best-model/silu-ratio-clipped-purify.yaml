# RIGID:    CLIPPED TO 10,000 SAMPLES
# NONRIGID: ALL DATA
TYPE: ENERGY

DATASET: 
  NAME: "CH4-N2-EN-NONRIGID"
  SOURCE: [
    "datasets/raw/ch4-n2/CH4-N2-EN-RIGID-10000-CORRECTED.npz",
    "datasets/raw/ch4-n2/CH4-N2-NONRIGID-CH4=0-1000-N2=0-1000-CORRECTED.npz",
    "datasets/raw/ch4-n2/CH4-N2-NONRIGID-CH4=1000-2000-N2=0-1000-CORRECTED.npz",
    "datasets/raw/ch4-n2/CH4-N2-NONRIGID-CH4=2000-3000-N2=0-1000-CORRECTED.npz",
  ]
  INTERIM_FOLDER: "datasets/interim/ch4-n2/"
  EXTERNAL_FOLDER: "datasets/external/ch4-n2/" 
  ORDER: 4 
  SYMMETRY: 4 2 1
  ATOM_MAPPING: [{0 : 1}, {0 : 1}, {0 : 1}, {0 : 1}, {1 : 7}, {1 : 7}, {0 : 6}]
  NORMALIZE: std 
  PURIFY: True
  VARIABLES:
    EXP_LAMBDA: 2.0
    INTERMOLECULAR: EXP 
    INTRAMOLECULAR: EXP 

MODEL:
  ACTIVATION: SiLU
  HIDDEN_DIMS: [32]

LOSS:
  NAME: WMSE
  WEIGHT_TYPE: Ratio 
  dwt: 1000.0

TRAINING:
  MAX_EPOCHS: 10000
  OPTIMIZER:
    NAME: LBFGS
    LR: 1.0
  SCHEDULER:
    NAME: ReduceLROnPlateau
    LR_REDUCE_GAMMA: 0.8
    PATIENCE: 200 
    THRESHOLD: 0.1
    THRESHOLD_MODE: abs
    COOLDOWN: 3
    MIN_LR: 1.0e-5
  EARLY_STOPPING:
    PATIENCE: 1000 
    TOLERANCE: 0.02
